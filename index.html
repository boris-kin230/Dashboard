    <!-- Lucide Icons pour les icônes -->

    <!-- Google Fonts -->

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            overflow: hidden; /* Empêche le scroll global pour faire "application" */
        }

        /* Personnalisation des barres de défilement pour un look professionnel */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }

        /* Animations personnalisées */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .tab-content {
            animation: fadeIn 0.3s ease-out forwards;
        }

        .spin-anim {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        const DEFAULT_EQUIPMENTS = {
            "DEPAL 8/9": [

            "SOUTIREUSE 8/9": [
                { quart: "Matin", real: true, taux: 100 },

                { quart: "Nuit", real: true, taux: 100 }
            ],
            "ETIQUETEUSE 8/9": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: true, taux: 100 },
                { quart: "Nuit", real: true, taux: 100 }
            ],
            "QF1/PARKER/CERMEX": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: true, taux: 100 },

            ],
            "DUO1": [
                { quart: "Matin", real: true, taux: 100 },

            ],
            "OCME": [
                { quart: "Matin", real: true, taux: 100 },

                { quart: "Nuit", real: true, taux: 100 }
            ],

        // Génération de l'historique des jours

        const ANNUAL_DATA = {

        // --- ETAT DE L'APPLICATION ---
        let state = {

        // --- FONCTIONS UTILITAIRES SVG ---
        
        // Jauge SVG pure HTML
        function getGaugeHTML(value) {
            const radius = 60;
            const strokeWidth = 15;
            const normalizedValue = Math.min(Math.max(value, 0), 100);
            const circumference = radius * Math.PI;
            const strokeDashoffset = circumference - (normalizedValue / 100) * circumference;
            const color = value === 100 ? "#16a34a" : (value > 80 ? "#eab308" : "#dc2626");

            return `
                <div class="flex flex-col items-center justify-center h-full relative p-4">
                    <svg width="200" height="110" viewBox="0 0 200 110" class="overflow-visible">
                        <path d="M 40 100 A ${radius} ${radius} 0 0 1 160 100" fill="none" stroke="#e5e7eb" stroke-width="${strokeWidth}" stroke-linecap="round" />
                        <path d="M 40 100 A ${radius} ${radius} 0 0 1 160 100" fill="none" stroke="${color}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${strokeDashoffset}" style="transition: all 1s ease-out;" />
                    </svg>
                    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/4 flex flex-col items-center">
                        <span class="text-4xl font-black text-gray-800">${value}%</span>
                    </div>
                    <div class="absolute bottom-0 w-full flex justify-between px-10 text-xs font-bold text-gray-500">
                        <span>0%</span>
                        <span class="text-green-700">OBJECTIF 100%</span>
                        <span>100%</span>
                    </div>
                </div>
            `;
        }

        // Graphique linéaire SVG pur HTML
        function getLineChartHTML(data) {
            const width = 600;
            const height = 250;
            const padding = 40;
            const minVal = 80;
            const maxVal = 100;
            
            const getX = (index) => padding + (index * (width - 2 * padding) / (data.months.length - 1));
            const getY = (val) => height - padding - ((val - minVal) / (maxVal - minVal) * (height - 2 * padding));

            let gridLines = [80, 85, 90, 95, 100].map(val => `
                <g>
                    <line x1="${padding}" y1="${getY(val)}" x2="${width-padding}" y2="${getY(val)}" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4 4" />
                    <text x="${padding - 10}" y="${getY(val) + 4}" font-size="10" fill="#9ca3af" text-anchor="end">${val}%</text>
                </g>
            `).join('');

            let seriesLines = data.series.map(s => {
                const points = s.data.map((val, i) => `${getX(i)},${getY(val)}`).join(" ");
                const circles = s.data.map((val, i) => `<circle cx="${getX(i)}" cy="${getY(val)}" r="4" fill="${s.color}" stroke="#fff" stroke-width="1" />`).join('');
                return `
                    <g>
                        <polyline points="${points}" fill="none" stroke="${s.color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                        ${circles}
                    </g>
                `;
            }).join('');

            let xLabels = data.months.map((m, i) => `
                <text x="${getX(i)}" y="${height - 10}" font-size="12" fill="#6b7280" text-anchor="middle">${m}</text>
            `).join('');

            let legends = data.series.map(s => `
                <div class="flex items-center gap-1">
                    <div class="w-3 h-3 rounded-full" style="background-color: ${s.color}"></div>
                    <span class="text-gray-700">${s.name}</span>
                </div>
            `).join('');

            return `
                <div class="bg-white p-4 rounded border border-gray-200 shadow-sm w-full h-full flex flex-col">
                    <div class="flex justify-center gap-4 mb-2 text-xs font-semibold">
                        ${legends}
                    </div>
                    <div class="relative flex-grow">
                        <svg width="100%" height="100%" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
                            ${gridLines}
                            ${seriesLines}
                            ${xLabels}
                        </svg>
                    </div>
                </div>
            `;
        }

        // Icone statut (Vrai/Faux)
        function getStatusIcon(status) {
            if (status) return `<div class="w-5 h-5 rounded-full bg-green-600 flex items-center justify-center text-white font-bold text-xs"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i></div>`;
            return `<div class="w-5 h-5 rounded-full bg-red-600 flex items-center justify-center text-white font-bold text-xs"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i></div>`;

        // Générateur de tableau d'équipement
        function getEquipmentTable(eqName, eqData) {
            const rows = eqData.map(row => `
                <tr class="border-b border-gray-100 last:border-0">
                    <td class="py-1.5 font-medium">${row.quart}</td>
                    <td class="py-1.5 flex justify-center">${getStatusIcon(row.real)}</td>
                    <td class="py-1.5 text-right font-bold">${row.taux}%</td>

            return `
                <div class="bg-white border border-gray-300 shadow-sm flex-1 flex flex-col overflow-hidden">
                    <div class="bg-pink-300 text-gray-800 font-bold text-center py-1.5 text-sm uppercase border-b border-gray-300 truncate px-2">
                        ${eqName}

                                    <th class="text-center font-normal pb-1">Réal</th>
                                    <th class="text-right font-normal pb-1">Taux</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }


        // --- RENDU DES VUES ---

        function renderDailyView() {
            const data = DAILY_DATA[state.selectedDate];
            if (!data) return `<div class="p-10 text-center font-bold text-red-500">Données non disponibles.</div>`;

            // Liste des dates pour la barre latérale
            const datesHTML = Object.keys(DAILY_DATA).reverse().map(date => {
                const isSelected = state.selectedDate === date;
                const activeClass = isSelected ? 'bg-green-100 border-green-500 font-bold text-green-800' : 'hover:bg-gray-100 border-transparent';
                const checkClass = isSelected ? 'bg-green-500 border-green-600' : 'bg-white border-gray-400';
                const iconHTML = isSelected ? `<i data-lucide="check-circle-2" class="w-2.5 h-2.5 text-white"></i>` : '';
                
                return `
                    <div onclick="changeDate('${date}')" class="flex items-center gap-2 text-sm cursor-pointer p-1.5 rounded transition-colors border ${activeClass}">
                        <div class="w-3 h-3 rounded-sm border flex items-center justify-center ${checkClass}">
                            ${iconHTML}
                        </div>
                        ${date}
                    </div>
                `;
            }).join('');

            // Liste des commentaires
            const commentsHTML = data.tasks.length > 0 ? data.tasks.map(task => `
                <tr class="bg-white hover:bg-blue-50/50 transition-colors">
                    <td class="p-2 border border-gray-200 align-top text-gray-800 font-medium">${task.task}</td>
                    <td class="p-2 border border-gray-200 align-top text-red-700">${task.prob}</td>
                    <td class="p-2 border border-gray-200 align-top text-gray-600 italic">
                        <div class="flex gap-1">
                            <i data-lucide="message-square" class="w-3 h-3 mt-0.5 shrink-0 text-gray-400"></i>
                            ${task.comment}
                        </div>
                    </td>
                </tr>
            `).join('') : `<tr><td colspan="3" class="p-8 text-center text-gray-400 italic">Aucune anomalie enregistrée.</td></tr>`;

            // Boutons d'action rapides
            const actionBtns = ["SOUTIREUSE", "PAL/DEPAL", "QF", "DUO1/OCME", "ETIQUETAGE"].map((btn, i) => `
                <button class="flex-1 py-3 rounded-full text-xs font-bold uppercase shadow-sm border border-gray-300 transition-transform active:scale-95 ${i === 0 ? 'bg-gray-800 text-white' : 'bg-pink-300 text-gray-900'}">
                    ${btn}
                </button>
            `).join('');

            return `
                <div class="flex flex-row gap-4 h-[calc(100vh-140px)] w-full overflow-hidden p-2">
                    
                    <!-- Colonne de gauche : Filtres & Historique -->
                    <div class="w-[180px] bg-white border border-gray-300 shadow-sm flex flex-col shrink-0">
                        <div class="bg-gray-100 p-2 border-b border-gray-300 font-bold text-sm flex items-center gap-2">
                            <i data-lucide="filter" class="w-4 h-4"></i> Filtres
                        </div>
                        <div class="p-3">
                            <label class="text-xs font-bold text-gray-600 block mb-2 uppercase">Historique J-7</label>
                            <div class="flex flex-col gap-2">
                                ${datesHTML}
                            </div>
                        </div>
                        <div class="mt-auto p-3 border-t border-gray-200 text-xs text-gray-400 text-center">
                            Dernière actualisation<br>Aujourd'hui à 10:09
                        </div>
                    </div>

                    <!-- Colonne du centre : Équipements & KPI -->
                    <div class="flex-1 flex flex-col gap-4 overflow-y-auto pr-2">
                        <!-- Ligne 1 -->
                        <div class="flex gap-4 min-h-[160px]">
                            <div class="bg-white border border-gray-300 shadow-sm flex-1 flex flex-col overflow-hidden">
                                <div class="bg-pink-300 text-gray-800 font-bold text-center py-1.5 text-sm uppercase border-b border-gray-300">
                                    Conformité Global
                                </div>
                                <div class="flex-1">
                                    ${getGaugeHTML(data.globalRate)}
                                </div>
                            </div>
                            ${getEquipmentTable("DEPAL 8/9", data.equipments["DEPAL 8/9"])}
                        </div>

                        <!-- Ligne 2 -->
                        <div class="flex gap-4">
                            ${getEquipmentTable("SOUTIREUSE 8/9", data.equipments["SOUTIREUSE 8/9"])}
                            ${getEquipmentTable("ETIQUETEUSE 8/9", data.equipments["ETIQUETEUSE 8/9"])}
                            ${getEquipmentTable("QF1/PARKER/CERMEX", data.equipments["QF1/PARKER/CERMEX"])}
                        </div>

                        <!-- Ligne 3 -->
                        <div class="flex gap-4">
                            ${getEquipmentTable("DUO1", data.equipments["DUO1"])}
                            ${getEquipmentTable("OCME", data.equipments["OCME"])}
                            ${getEquipmentTable("PAL/MSK", data.equipments["PAL/MSK"])}
                        </div>

                        <!-- Boutons d'action -->
                        <div class="flex gap-4 mt-auto py-2">
                            ${actionBtns}
                        </div>
                    </div>

                    <!-- Colonne de droite : Commentaires & Tâches -->
                    <div class="w-[450px] bg-white border border-gray-400 shadow-sm flex flex-col shrink-0 relative">
                        <div class="bg-gray-50 flex items-center justify-between p-2 border-b border-gray-300">
                            <h3 class="font-bold text-sm text-gray-800 flex items-center gap-2">
                                <i data-lucide="message-square" class="w-4 h-4 text-blue-600"></i>
                                Suivi des anomalies et commentaires
                            </h3>
                            <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full font-bold">
                                ${data.tasks.length} Entrées
                            </span>
                        </div>
                        
                        <div class="flex-1 overflow-auto bg-gray-50/50">
                            <table class="w-full text-xs text-left border-collapse">
                                <thead class="sticky top-0 bg-gray-100 shadow-sm z-10">
                                    <tr>
                                        <th class="p-2 border border-gray-300 w-1/3 text-gray-600">Tâches</th>
                                        <th class="p-2 border border-gray-300 w-1/3 text-gray-600">Problème/Commentaire</th>
                                        <th class="p-2 border border-gray-300 w-1/3 text-gray-600">Commentaires (Actions)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${commentsHTML}
                                </tbody>
                            </table>
                        </div>
                        <div class="p-2 border-t border-gray-300 text-right text-[10px] text-gray-500 bg-white">
                            Tableau mis à jour dynamiquement
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAnnualView() {
            // Podium
            const podiumHTML = ANNUAL_DATA.rankings.map(team => {
                let icon = '';
                if(team.rank === 1) icon = `<i data-lucide="award" class="w-6 h-6 text-yellow-600" fill="currentColor"></i>`;
                if(team.rank === 2) icon = `<i data-lucide="medal" class="w-5 h-5 text-gray-500" fill="currentColor"></i>`;
                if(team.rank === 3) icon = `<i data-lucide="medal" class="w-5 h-5 text-orange-700" fill="currentColor"></i>`;

                const leaderBadge = team.rank === 1 ? `<div class="absolute top-0 right-0 bg-yellow-500 text-white text-xs font-bold px-4 py-1 rounded-bl-lg shadow">LEADER</div>` : '';

                return `
                    <div class="${team.lightBg} ${team.borderColor} border-2 rounded shadow-sm flex-1 flex relative overflow-hidden">
                        ${leaderBadge}
                        <div class="w-3 h-full ${team.color}"></div>
                        <div class="flex-1 flex flex-col items-center justify-center p-2">
                            <div class="flex items-center gap-2 font-black text-xl ${team.textColor}">
                                ${icon}
                                ${team.team} | ${team.score}%
                            </div>
                            <div class="text-xs uppercase font-bold mt-1 opacity-75 ${team.textColor}">
                                Classement Annuel #${team.rank}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Tableau annuel avec nouvelles colonnes
            const tableHTML = ANNUAL_DATA.table.map(row => {
                const renderCell = (val) => {
                    const isGood = val >= 90;
                    const isBad = val < 85;
                    const starIcon = isGood ? `<i data-lucide="star" class="w-3.5 h-3.5 text-yellow-500" fill="currentColor"></i>` : '';
                    const textClass = isBad ? 'text-red-600 font-bold' : 'text-gray-800';
                    return `
                        <td class="p-3 border border-gray-200 font-medium relative group">
                            <div class="flex items-center justify-center gap-1">
                                ${starIcon}
                                <span class="${textClass}">${val}%</span>
                            </div>
                            <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-1 hidden group-hover:block bg-gray-800 text-white text-[10px] px-2 py-1 rounded whitespace-nowrap z-10">
                                Performances: ${val}%
                            </div>
                        </td>
                    `;
                };

                return `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-3 border border-gray-200 font-bold text-gray-700 bg-gray-50/50 text-left pl-4">${row.name}</td>
                        <td class="p-3 border border-gray-200 text-gray-600">${row.year}</td>
                        ${renderCell(row.depal)}
                        ${renderCell(row.soutireuse)}
                        ${renderCell(row.etiqueteuse)}
                        ${renderCell(row.map)}
                        ${renderCell(row.pitStop)}
                        ${renderCell(row.pal)}
                    </tr>
                `;
            }).join('');

            // Boutons bas de graphique
            const graphBtns = ["JOURNALIER", "FIN DE PROD", "AI", "SEMAINE", "ANNUEL"].map(btn => {
                const style = btn === "ANNUEL" ? 'bg-gray-800 text-white' : 'bg-[#fde68a] text-gray-800 hover:bg-[#fcd34d]';
                return `<button class="flex-1 py-3 rounded-full text-xs font-bold uppercase shadow-sm border border-gray-300 transition-colors ${style}">${btn}</button>`;
            }).join('');

            return `
                <div class="flex flex-col gap-4 h-[calc(100vh-140px)] w-full overflow-hidden p-2">
                    
                    <!-- Haut : Podium -->
                    <div class="flex gap-4 h-24">
                        <div class="w-1/4 bg-gray-300 rounded shadow-sm flex items-center justify-center border border-gray-400">
                            <span class="text-gray-500 font-bold text-sm tracking-widest uppercase">Performances</span>
                        </div>
                        ${podiumHTML}
                    </div>

                    <!-- Bas : Tableau & Graphique -->
                    <div class="flex gap-4 flex-1 overflow-hidden">
                        
                        <!-- Tableau détaillé -->
                        <div class="flex-[1.2] bg-white border border-gray-300 shadow-sm rounded flex flex-col overflow-hidden">
                            <div class="bg-gray-100 p-3 border-b border-gray-300 font-bold text-sm text-gray-800 flex justify-between items-center">
                                <span>Détail par Unité et par Équipe (Année 2026)</span>
                                <button class="flex items-center gap-1 text-xs text-blue-600 hover:text-blue-800 bg-blue-50 px-2 py-1 rounded">
                                    <i data-lucide="file-down" class="w-3.5 h-3.5"></i> Exporter
                                </button>
                            </div>
                            <div class="overflow-auto">
                                <table class="w-full text-sm text-center border-collapse">
                                    <thead class="bg-[#fde68a] text-gray-800 uppercase text-xs">
                                        <tr>
                                            <th class="p-3 border border-gray-300 font-black">Équipe</th>
                                            <th class="p-3 border border-gray-300 font-black">Année</th>
                                            <th class="p-3 border border-gray-300 font-black">DEPAL</th>
                                            <th class="p-3 border border-gray-300 font-black">SOUTIREUSE</th>
                                            <th class="p-3 border border-gray-300 font-black">ETIQUETEUSE</th>
                                            <th class="p-3 border border-gray-300 font-black">MAP</th>
                                            <th class="p-3 border border-gray-300 font-black">PIT STOP</th>
                                            <th class="p-3 border border-gray-300 font-black">PAL</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${tableHTML}
                                    </tbody>
                                </table>
                            </div>
                            <div class="p-3 bg-gray-50 border-t border-gray-200 text-xs text-gray-500 italic flex items-center gap-2 mt-auto">
                                <i data-lucide="star" class="w-3 h-3 text-yellow-500" fill="currentColor"></i> Objectif atteint si supérieur ou égal à 90%
                            </div>
                        </div>

                        <!-- Graphique -->
                        <div class="flex-1 flex flex-col gap-2">
                            <div class="bg-white border border-gray-300 shadow-sm rounded flex-1 flex flex-col p-2">
                                <div class="flex justify-between items-center mb-2 px-2">
                                    <h4 class="font-bold text-sm text-gray-700">Évolution de la Conformité (Mensuel)</h4>
                                    <select class="border border-gray-300 rounded text-xs p-1 outline-none cursor-pointer bg-white">
                                        <option>Année 2026</option>
                                        <option>Année 2025</option>
                                    </select>
                                </div>
                                <div class="flex-1 relative">
                                    ${getLineChartHTML(ANNUAL_DATA.chart)}
                                </div>
                            </div>
                            
                            <!-- Menu navigation secondaire -->
                            <div class="flex gap-2 mt-2">
                                ${graphBtns}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- CONTRÔLEURS ET MISE A JOUR DU DOM ---

        function renderBottomTabs() {
            const tabsContainer = document.getElementById('bottom-tabs');
            let tabsHTML = `<div class="flex gap-1 text-xs font-bold text-gray-600">`;
            
            state.tabs.forEach(tab => {
                const isActive = state.activeTab === tab;
                const activeClass = isActive ? 'bg-white border-green-600 text-green-700' : 'border-transparent hover:bg-gray-200';
                const closeIcon = isActive ? `<div class="w-4 h-4 hover:bg-gray-200 rounded-full flex items-center justify-center -mr-2"><i data-lucide="x-circle" class="w-2.5 h-2.5 text-gray-400"></i></div>` : '';
                
                // Pour simplifier la démo, on force le rendu sur les 2 vues codées
                const onClickParam = tab === "ANNUEL" ? "ANNUEL" : "JOURNALIER";

                tabsHTML += `
                    <div onclick="changeTab('${onClickParam}')" class="px-4 py-2 cursor-pointer whitespace-nowrap border-b-2 transition-colors flex items-center gap-2 ${activeClass}">
                        ${tab}
                        ${closeIcon}
                    </div>
                `;
            });

            tabsHTML += `
                <div class="px-3 py-1 ml-2 bg-green-700 text-white rounded cursor-pointer hover:bg-green-800 flex items-center justify-center shadow-sm">
                    <span class="font-bold text-lg leading-none">+</span>
                </div>
            </div>`;

            // Contrôles de page droite
            const pageNum = state.activeTab === 'JOURNALIER' ? '1' : '5';
            tabsHTML += `
                <div class="ml-auto flex items-center gap-4 text-gray-500">
                    <div class="text-xs font-semibold whitespace-nowrap">Page ${pageNum} sur 7</div>
                    <div class="flex items-center gap-2">
                        <button class="hover:text-gray-800"><i data-lucide="settings" class="w-4 h-4"></i></button>
                        <button class="hover:text-gray-800"><i data-lucide="maximize-2" class="w-4 h-4"></i></button>
                    </div>
                    <div class="flex items-center gap-2 text-xs">
                        <span>-</span>
                        <input type="range" min="10" max="200" value="67" class="w-24 accent-green-600">
                        <span>+</span>
                        <span class="w-8 font-mono">67%</span>
                    </div>
                </div>
            `;

            tabsContainer.innerHTML = tabsHTML;
        }

        function updateUI() {
            // Mise à jour des titres
            const titleEl = document.getElementById('main-title');
            const subtitleEl = document.getElementById('main-subtitle');
            const containerEl = document.getElementById('view-container');

            if (state.activeTab === 'JOURNALIER') {
                titleEl.textContent = 'CONFORMITE CILT JOURNALIER 8/9';
                subtitleEl.textContent = `DCS du ${state.selectedDate}`;
                containerEl.innerHTML = renderDailyView();
            } else {
                titleEl.textContent = 'CONFORMITE ANNUELLE BILAN 8/9';
                subtitleEl.textContent = `Année 2026`;
                containerEl.innerHTML = renderAnnualView();
            }

            // Relancer l'animation
            containerEl.classList.remove('tab-content');
            void containerEl.offsetWidth; // trigger reflow
            containerEl.classList.add('tab-content');

            renderBottomTabs();
            
            // Initialisation des icônes Lucide fraîchement injectées dans le DOM
            lucide.createIcons();
        }

        // Fonctions globales pour les événements onclick (HTML)
        window.changeTab = function(tabName) {
            state.activeTab = tabName;
            updateUI();
        };

        window.changeDate = function(dateStr) {
            state.selectedDate = dateStr;
            updateUI();
        };

        window.refreshData = function(el) {
            const icon = el.querySelector('#refresh-icon');
            icon.classList.add('spin-anim');
            setTimeout(() => {
                icon.classList.remove('spin-anim');
            }, 800);
        };

        // --- INITIALISATION ---
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
        });

    </script>
</body>
</html>
