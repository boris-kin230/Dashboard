<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CILT Heineken</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js pour des graphiques modernes -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .lucide {
            width: 100%;
            height: 100%;
        }
        /* Style personnalisé pour la scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af; 
        }
    </style>
</head>
<body class="bg-gray-200 font-sans text-gray-900 overflow-hidden h-screen flex items-center justify-center p-4">

    <!-- Conteneur Principal -->
    <div id="app-root" class="w-full max-w-[1600px] h-full max-h-[900px] bg-white shadow-2xl rounded-xl overflow-hidden flex flex-col border border-gray-300">
        <!-- Le contenu sera injecté ici par JavaScript -->
    </div>

    <script>
        // ============================================================================
        // 1. BASE DE DONNÉES SIMULÉE (MOCK DATA)
        // ============================================================================
        const EQUIPEMENTS_DEFAUT = {
            "DEPAL 8/9": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: true, taux: 100 },
                { quart: "Nuit", real: true, taux: 100 }
            ],
            "SOUTIREUSE 8/9": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: true, taux: 100 },
                { quart: "Nuit", real: true, taux: 100 }
            ],
            "ETIQUETEUSE 8/9": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: true, taux: 96 },
                { quart: "Nuit", real: true, taux: 100 }
            ],
            "QF1/PARKER/CERMEX": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: false, taux: 0 },
                { quart: "Nuit", real: true, taux: 100 }
            ],
            "DUO1": [
                { quart: "Matin", real: false, taux: 0 },
                { quart: "Après-midi", real: false, taux: 0 },
                { quart: "Nuit", real: false, taux: 0 }
            ],
            "OCME": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: true, taux: 100 },
                { quart: "Nuit", real: false, taux: 50 }
            ],
            "PAL/MSK": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: true, taux: 94 },
                { quart: "Nuit", real: true, taux: 100 }
            ]
        };

        const DAILY_DATA = {
            "17/03/2026": {
                globalRate: 85,
                equipments: { ...EQUIPEMENTS_DEFAUT },
                tasks: [
                    { id: 1, name: "MARS CDT CILT G8/9 PAL 1, 2, 3, MSK", points: "1.3 Mousser les sols de la zone 15mns et rincer", comment: "Raison : juste à l'eau", status: "warning" },
                    { id: 2, name: "MARS CDT CILT ETIQUETEUSE G8/9", points: "2.5 Les verniers sont-ils tous au standard ?", comment: "Raison : usure poste", status: "warning" },
                    { id: 3, name: "MARS CDT CILT G89 OCME Journalier", points: "Purger les bacs à colle", comment: "Fait après la pause", status: "ok" }
                ]
            },
            "16/03/2026": {
                globalRate: 85,
                equipments: {
                    ...EQUIPEMENTS_DEFAUT,
                    "DEPAL 8/9": [
                        { quart: "Matin", real: true, taux: 100 },
                        { quart: "Après-midi", real: false, taux: 50 },
                        { quart: "Nuit", real: true, taux: 100 }
                    ],
                    "SOUTIREUSE 8/9": [
                        { quart: "Matin", real: true, taux: 100 },
                        { quart: "Après-midi", real: true, taux: 100 },
                        { quart: "Nuit", real: false, taux: 80 }
                    ]
                },
                tasks: [
                    { id: 4, name: "Maintenance préventive SOUTIREUSE", points: "Vérification des filtres", comment: "Filtre B remplacé en urgence", status: "error" }
                ]
            },
            "15/03/2026": { globalRate: 92, equipments: { ...EQUIPEMENTS_DEFAUT, "DUO1": [{ quart: "Matin", real: true, taux: 100 }, { quart: "Après-midi", real: true, taux: 100 }, { quart: "Nuit", real: true, taux: 100 }] }, tasks: [] },
            "14/03/2026": { globalRate: 98, equipments: EQUIPEMENTS_DEFAUT, tasks: [] },
            "13/03/2026": { globalRate: 100, equipments: EQUIPEMENTS_DEFAUT, tasks: [] }
        };

        const ANNUAL_DATA = {
            rankings: [
                { team: "Équipe C", score: 92.6, rank: 1, color: "bg-yellow-500", textColor: "text-yellow-900", borderColor: "border-yellow-600" },
                { team: "Équipe D", score: 90.0, rank: 2, color: "bg-gray-300", textColor: "text-gray-800", borderColor: "border-gray-400" },
                { team: "Équipe A", score: 89.8, rank: 3, color: "bg-orange-400", textColor: "text-orange-900", borderColor: "border-orange-500" }
            ],
            // Colonnes mises à jour : DEPAL, SOUTIREUSE, ETIQUETEUSE, MAP, PIT STOP, PAL
            table: [
                { name: "Équipe A", depal: 88, soutireuse: 87, etiqueteuse: 98, map: 86, pitstop: 88, pal: 89.8 },
                { name: "Équipe B", depal: 82, soutireuse: 90, etiqueteuse: 88, map: 80, pitstop: 82, pal: 84.4 },
                { name: "Équipe C", depal: 91, soutireuse: 95, etiqueteuse: 99, map: 93, pitstop: 91, pal: 94.6 },
                { name: "Équipe D", depal: 90, soutireuse: 89, etiqueteuse: 96, map: 87, pitstop: 88, pal: 90.0 }
            ],
            chart: {
                months: ["Janvier", "Février", "Mars"],
                series: [
                    { name: "Équipe A", color: "#e37400", data: [88, 89, 89.8] },
                    { name: "Équipe B", color: "#6c2bd9", data: [82, 85, 84.4] },
                    { name: "Équipe C", color: "#007A33", data: [90, 91.5, 92.6] },
                    { name: "Équipe D", color: "#2563eb", data: [86, 90, 90] }
                ]
            }
        };

        // ============================================================================
        // 2. STATE GLOBALE & INSTANCES GRAPHIQUES
        // ============================================================================
        let activeTab = "JOURNALIER";
        let currentDate = "17/03/2026";
        let gaugeChartInstance = null;
        let lineChartInstance = null;

        // ============================================================================
        // 3. FONCTIONS D'AIDE ET COMPOSANTS HTML
        // ============================================================================

        function setTab(tab) {
            activeTab = tab;
            render();
        }

        function setDate(date) {
            currentDate = date;
            render();
        }

        function getStatusIcon(real, taux) {
            if (taux === 0 || real === false) return `<div class="w-5 h-5 text-red-600 fill-red-100"><i data-lucide="x-circle"></i></div>`;
            if (taux > 0 && taux < 100) return `<div class="w-5 h-5 text-orange-500 fill-orange-100"><i data-lucide="alert-circle"></i></div>`;
            if (taux === 100 && real === true) return `<div class="w-5 h-5 text-green-600 fill-green-100"><i data-lucide="check-circle-2"></i></div>`;
            return `<div class="w-5 h-5 text-gray-300"><i data-lucide="minus-circle"></i></div>`;
        }

        function renderStarRating(value) {
            const isGood = value >= 85;
            const colorClass = isGood ? 'text-yellow-500 fill-yellow-400' : 'text-gray-300 fill-gray-100';
            return `<div class="flex justify-center w-5 h-5 ${colorClass}"><i data-lucide="star"></i></div>`;
        }

        function renderEquipmentTableCard(title, data) {
            const rowsHtml = data.map((row) => `
                <tr class="border-b border-gray-50 last:border-0 hover:bg-gray-50 transition-colors">
                    <td class="py-1.5 text-gray-700 font-medium">${row.quart}</td>
                    <td class="py-1.5 text-center flex justify-center">${getStatusIcon(row.real, row.taux)}</td>
                    <td class="py-1.5 text-right font-bold text-gray-800">${row.taux > 0 ? row.taux + '%' : ''}</td>
                </tr>
            `).join('');

            return `
                <div class="bg-white border border-gray-200 shadow-sm rounded flex flex-col h-full overflow-hidden">
                    <div class="bg-gray-100 text-gray-700 font-bold text-xs py-2 px-3 text-center border-b border-gray-200 uppercase tracking-tight">
                        ${title}
                    </div>
                    <div class="p-2 flex-grow">
                        <table class="w-full text-xs">
                            <thead>
                                <tr class="text-gray-500 border-b border-gray-100">
                                    <th class="text-left font-semibold pb-1 w-1/2">Quart</th>
                                    <th class="text-center font-semibold pb-1">Réal</th>
                                    <th class="text-right font-semibold pb-1">Taux</th>
                                </tr>
                            </thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // ============================================================================
        // 4. VUES PRINCIPALES (PAGES)
        // ============================================================================

        function renderJournalierView() {
            const currentData = DAILY_DATA[currentDate] || DAILY_DATA["17/03/2026"];
            const dates = Object.keys(DAILY_DATA);

            const datesHtml = dates.map(d => `
                <label class="flex items-center space-x-3 p-2 rounded cursor-pointer transition-colors ${currentDate === d ? 'bg-green-50 border border-green-200' : 'hover:bg-gray-100 border border-transparent'}">
                    <input type="radio" name="dateSelector" class="w-4 h-4 text-green-600 rounded-full border-gray-300 focus:ring-green-500" 
                           ${currentDate === d ? 'checked' : ''} onchange="setDate('${d}')" />
                    <span class="text-sm ${currentDate === d ? 'font-bold text-green-800' : 'text-gray-700'}">${d}</span>
                </label>
            `).join('');

            const tasksHtml = currentData.tasks.length > 0 ? currentData.tasks.map(task => `
                <div class="grid grid-cols-3 gap-2 border-b border-gray-100 pb-3 mb-3 text-xs">
                    <div class="font-semibold text-gray-800 flex items-start gap-1">
                        <div class="w-3 h-3 text-gray-400 mt-0.5 flex-shrink-0"><i data-lucide="check-square"></i></div>
                        ${task.name}
                    </div>
                    <div class="text-gray-600">${task.points}</div>
                    <div class="flex items-start space-x-1 text-gray-700 bg-gray-50 p-1.5 rounded border border-gray-100">
                        <div class="w-3 h-3 text-blue-400 mt-0.5 flex-shrink-0"><i data-lucide="file-text"></i></div>
                        <span>${task.comment}</span>
                    </div>
                </div>
            `).join('') : `
                <div class="h-full flex flex-col items-center justify-center text-gray-400 space-y-2 py-10">
                    <div class="w-12 h-12 text-green-200"><i data-lucide="check-circle-2"></i></div>
                    <p class="text-sm font-medium">Aucune anomalie signalée ce jour.</p>
                </div>
            `;

            return `
                <div class="flex h-full gap-4 bg-gray-50 p-4">
                    <!-- Colonne gauche : Calendrier / Filtres -->
                    <div class="w-56 bg-white border border-gray-200 shadow-sm rounded flex flex-col">
                        <div class="bg-[#1a2b49] text-white font-bold text-sm py-3 px-4 flex justify-between items-center rounded-t">
                            <span>Historique DCS</span>
                            <div class="w-4 h-4 text-gray-300"><i data-lucide="calendar"></i></div>
                        </div>
                        <div class="flex-1 overflow-y-auto p-2 space-y-1">
                            ${datesHtml}
                        </div>
                    </div>

                    <!-- Zone Centrale : Graphique & Équipements -->
                    <div class="flex-1 flex flex-col gap-4">
                        <div class="grid grid-cols-5 gap-4 h-56">
                            <!-- Gauge Graphique -->
                            <div class="col-span-2 bg-white border border-gray-200 shadow-sm rounded flex flex-col relative p-2">
                                <div class="text-center font-bold text-sm text-gray-700 uppercase mb-2 tracking-wide">Conformité Globale</div>
                                <div class="relative w-full flex-1 flex justify-center items-center">
                                    <canvas id="gaugeChart"></canvas>
                                    <div class="absolute inset-0 flex flex-col items-center justify-center pt-8 pointer-events-none">
                                        <span class="text-4xl font-extrabold text-[#1a2b49]">${currentData.globalRate}%</span>
                                    </div>
                                </div>
                            </div>
                            <!-- Équipements Row 1 -->
                            <div class="col-span-3 grid grid-cols-3 gap-4">
                                ${renderEquipmentTableCard("DEPAL 8/9", currentData.equipments["DEPAL 8/9"])}
                                ${renderEquipmentTableCard("SOUTIREUSE 8/9", currentData.equipments["SOUTIREUSE 8/9"])}
                                ${renderEquipmentTableCard("ETIQUETEUSE 8/9", currentData.equipments["ETIQUETEUSE 8/9"])}
                            </div>
                        </div>
                        
                        <!-- Équipements Row 2 -->
                        <div class="grid grid-cols-4 gap-4 flex-1">
                            ${renderEquipmentTableCard("QF1/PARKER/CERMEX", currentData.equipments["QF1/PARKER/CERMEX"])}
                            ${renderEquipmentTableCard("DUO1", currentData.equipments["DUO1"])}
                            ${renderEquipmentTableCard("OCME", currentData.equipments["OCME"])}
                            ${renderEquipmentTableCard("PAL/MSK", currentData.equipments["PAL/MSK"])}
                        </div>
                    </div>

                    <!-- Colonne Droite : Tâches -->
                    <div class="w-[450px] bg-white border border-gray-200 shadow-sm rounded flex flex-col">
                        <div class="bg-[#f0accb] text-[#5c1c3c] font-bold text-sm py-3 px-4 rounded-t flex items-center justify-between uppercase">
                            <span>Suivi des anomalies</span>
                            <div class="w-4 h-4"><i data-lucide="clipboard-list"></i></div>
                        </div>
                        <div class="bg-gray-50 border-b border-gray-200 py-2 px-3 flex justify-between items-center text-xs font-bold text-gray-500 uppercase">
                            <div class="flex-1">Tâches</div>
                            <div class="flex-1">Points de contrôle</div>
                            <div class="flex-1">Commentaires</div>
                        </div>
                        <div class="flex-1 overflow-y-auto p-3">
                            ${tasksHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAnnuelView() {
            const ranks = ANNUAL_DATA.rankings;
            
            const tableHtml = ANNUAL_DATA.table.map(row => `
                <tr class="hover:bg-green-50 transition-colors border-b border-gray-100 last:border-0">
                    <td class="py-3 px-4 font-bold text-gray-800">
                        <div class="flex items-center space-x-2">
                            <div class="w-2 h-2 rounded-full" style="background-color: ${ANNUAL_DATA.chart.series.find(s=>s.name===row.name)?.color || '#ccc'}"></div>
                            <span>${row.name}</span>
                        </div>
                    </td>
                    <td class="py-3 px-2 text-center"><div class="flex items-center justify-center space-x-1">${renderStarRating(row.depal)}<span class="text-gray-600 font-medium">${row.depal}%</span></div></td>
                    <td class="py-3 px-2 text-center"><div class="flex items-center justify-center space-x-1">${renderStarRating(row.soutireuse)}<span class="text-gray-600 font-medium">${row.soutireuse}%</span></div></td>
                    <td class="py-3 px-2 text-center"><div class="flex items-center justify-center space-x-1">${renderStarRating(row.etiqueteuse)}<span class="text-gray-600 font-medium">${row.etiqueteuse}%</span></div></td>
                    <td class="py-3 px-2 text-center"><div class="flex items-center justify-center space-x-1">${renderStarRating(row.map)}<span class="text-gray-600 font-medium">${row.map}%</span></div></td>
                    <td class="py-3 px-2 text-center"><div class="flex items-center justify-center space-x-1">${renderStarRating(row.pitstop)}<span class="text-gray-600 font-medium">${row.pitstop}%</span></div></td>
                    <td class="py-3 px-2 text-center"><div class="flex items-center justify-center space-x-1">${renderStarRating(row.pal)}<span class="text-gray-600 font-medium">${row.pal}%</span></div></td>
                </tr>
            `).join('');

            return `
                <div class="flex flex-col h-full gap-4 bg-gray-50 p-4">
                    <!-- Podiums -->
                    <div class="flex space-x-4 h-32 w-full max-w-4xl mx-auto">
                        <div class="flex-1 ${ranks[1].color} border-t-4 ${ranks[1].borderColor} rounded shadow-md flex flex-col items-center justify-center p-4 transform translate-y-4">
                            <div class="flex items-center space-x-2"><div class="w-8 h-8 text-gray-100 drop-shadow"><i data-lucide="medal"></i></div><h2 class="text-lg font-bold ${ranks[1].textColor} uppercase tracking-widest">${ranks[1].team}</h2></div>
                            <p class="text-3xl font-black ${ranks[1].textColor} mt-1">${ranks[1].score}%</p>
                        </div>
                        <div class="flex-1 ${ranks[0].color} border-t-4 ${ranks[0].borderColor} rounded shadow-lg flex flex-col items-center justify-center p-4 z-10 scale-105">
                            <div class="flex items-center space-x-2"><div class="w-10 h-10 text-yellow-100 drop-shadow-md"><i data-lucide="trophy"></i></div><h2 class="text-2xl font-black ${ranks[0].textColor} uppercase tracking-widest">${ranks[0].team}</h2></div>
                            <p class="text-4xl font-black ${ranks[0].textColor} mt-1">${ranks[0].score}%</p>
                        </div>
                        <div class="flex-1 ${ranks[2].color} border-t-4 ${ranks[2].borderColor} rounded shadow-md flex flex-col items-center justify-center p-4 transform translate-y-6">
                            <div class="flex items-center space-x-2"><div class="w-7 h-7 text-orange-100 drop-shadow"><i data-lucide="medal"></i></div><h2 class="text-lg font-bold ${ranks[2].textColor} uppercase tracking-widest">${ranks[2].team}</h2></div>
                            <p class="text-2xl font-black ${ranks[2].textColor} mt-1">${ranks[2].score}%</p>
                        </div>
                    </div>

                    <!-- Table & Chart (Chart.js) -->
                    <div class="flex gap-4 flex-1 mt-6">
                        <div class="w-[60%] bg-white border border-gray-200 shadow-sm rounded overflow-hidden flex flex-col">
                            <div class="bg-gray-100 border-b border-gray-200 py-2 px-4 font-bold text-gray-700 uppercase text-sm flex justify-between items-center">
                                <span>Détails par domaine (Année 2026)</span>
                                <div class="w-4 h-4 text-gray-500"><i data-lucide="table"></i></div>
                            </div>
                            <div class="flex-1 overflow-auto">
                                <table class="w-full text-sm">
                                    <thead>
                                        <tr class="bg-yellow-100 text-yellow-900 border-b border-yellow-200">
                                            <th class="py-3 px-4 text-left font-bold uppercase">Équipe</th>
                                            <th class="py-3 px-2 text-center font-bold text-xs uppercase">DEPAL</th>
                                            <th class="py-3 px-2 text-center font-bold text-xs uppercase">SOUTIREUSE</th>
                                            <th class="py-3 px-2 text-center font-bold text-xs uppercase">ETIQUETEUSE</th>
                                            <th class="py-3 px-2 text-center font-bold text-xs uppercase">MAP</th>
                                            <th class="py-3 px-2 text-center font-bold text-xs uppercase">PIT STOP</th>
                                            <th class="py-3 px-2 text-center font-bold text-xs uppercase">PAL</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">${tableHtml}</tbody>
                                </table>
                            </div>
                        </div>
                        <div class="w-[40%] bg-white border border-gray-200 shadow-sm rounded p-4 flex flex-col">
                            <h3 class="font-bold text-gray-700 mb-2 uppercase text-sm flex items-center gap-2">
                                <div class="w-4 h-4 text-[#007A33]"><i data-lucide="trending-up"></i></div>
                                Évolution de la conformité
                            </h3>
                            <div class="flex-1 relative w-full h-full">
                                <canvas id="lineChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================================================
        // 5. INITIALISATION DES GRAPHIQUES (CHART.JS)
        // ============================================================================
        
        function initCharts() {
            // Détruire les instances précédentes pour éviter les conflits
            if (gaugeChartInstance) { gaugeChartInstance.destroy(); gaugeChartInstance = null; }
            if (lineChartInstance) { lineChartInstance.destroy(); lineChartInstance = null; }

            if (activeTab === "JOURNALIER") {
                const ctxGauge = document.getElementById('gaugeChart');
                if (ctxGauge) {
                    const rate = DAILY_DATA[currentDate]?.globalRate || 0;
                    gaugeChartInstance = new Chart(ctxGauge, {
                        type: 'doughnut',
                        data: {
                            datasets: [{
                                data: [rate, 100 - rate],
                                backgroundColor: ['#007A33', '#e5e7eb'],
                                borderWidth: 0,
                                borderRadius: [5, 0],
                            }]
                        },
                        options: {
                            circumference: 180,
                            rotation: 270,
                            cutout: '80%',
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                tooltip: { enabled: false },
                                legend: { display: false }
                            },
                            animation: { animateScale: true, animateRotate: true }
                        }
                    });
                }
            } else if (activeTab === "ANNUEL") {
                const ctxLine = document.getElementById('lineChart');
                if (ctxLine) {
                    const datasets = ANNUAL_DATA.chart.series.map(serie => ({
                        label: serie.name,
                        data: serie.data,
                        borderColor: serie.color,
                        backgroundColor: serie.color,
                        tension: 0.3,
                        borderWidth: 3,
                        pointRadius: 4,
                        pointBackgroundColor: '#ffffff',
                        pointBorderWidth: 2,
                        pointHoverRadius: 6
                    }));

                    lineChartInstance = new Chart(ctxLine, {
                        type: 'line',
                        data: {
                            labels: ANNUAL_DATA.chart.months,
                            datasets: datasets
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: {
                                mode: 'index',
                                intersect: false,
                            },
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: { usePointStyle: true, padding: 20, font: { size: 11, family: 'sans-serif', weight: 'bold' } }
                                },
                                tooltip: {
                                    backgroundColor: 'rgba(26, 43, 73, 0.9)',
                                    titleFont: { size: 13 },
                                    bodyFont: { size: 13, weight: 'bold' },
                                    padding: 10,
                                    cornerRadius: 4,
                                    callbacks: {
                                        label: function(context) { return context.dataset.label + ': ' + context.parsed.y + '%'; }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    min: 80, max: 100,
                                    grid: { color: '#f3f4f6', drawBorder: false },
                                    ticks: { callback: function(value) { return value + '%'; }, font: { size: 11, weight: '500' }, color: '#6b7280' }
                                },
                                x: {
                                    grid: { display: false, drawBorder: false },
                                    ticks: { font: { size: 12, weight: 'bold' }, color: '#4b5563' }
                                }
                            }
                        }
                    });
                }
            }
        }

        // ============================================================================
        // 6. RENDU PRINCIPAL DE L'APPLICATION
        // ============================================================================

        function render() {
            const root = document.getElementById("app-root");
            
            let mainContent = "";
            if (activeTab === "JOURNALIER") mainContent = renderJournalierView();
            else if (activeTab === "ANNUEL") mainContent = renderAnnuelView();

            // Navigation sous forme d'onglets (remplace les "onglets bulles")
            const tabsHtml = `
                <div class="flex space-x-2">
                    <button onclick="setTab('JOURNALIER')" class="px-6 py-2.5 text-sm font-bold uppercase transition-all rounded-t-lg border-t-4 ${activeTab === 'JOURNALIER' ? 'bg-white border-[#007A33] text-[#007A33]' : 'bg-gray-100 border-transparent text-gray-500 hover:bg-gray-200'}">
                        Journalier
                    </button>
                    <button onclick="setTab('ANNUEL')" class="px-6 py-2.5 text-sm font-bold uppercase transition-all rounded-t-lg border-t-4 ${activeTab === 'ANNUEL' ? 'bg-white border-[#007A33] text-[#007A33]' : 'bg-gray-100 border-transparent text-gray-500 hover:bg-gray-200'}">
                        Annuel
                    </button>
                </div>
            `;

            root.innerHTML = `
                <!-- HEADER (Avec navigation intégrée) -->
                <header class="bg-[#1a2b49] flex flex-col pt-4 px-6 border-b border-gray-200">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center space-x-6">
                            <div class="flex items-center bg-white py-1 px-3 rounded shadow-sm">
                                <div class="w-6 h-6 text-red-600 fill-red-600 mr-2 transform -rotate-12"><i data-lucide="star"></i></div>
                                <h1 class="text-2xl font-black tracking-tighter text-[#007A33]">HEINEKEN</h1>
                            </div>
                            <h2 class="text-2xl font-bold text-white tracking-tight">
                                ${activeTab === "JOURNALIER" ? "CONFORMITÉ CILT JOURNALIER 8/9" : "CONFORMITÉ ANNUELLE BILAN 8/9"}
                            </h2>
                        </div>
                        <div class="flex items-center space-x-4 bg-white/10 text-white py-1.5 px-4 rounded border border-white/20">
                            <div class="w-4 h-4 text-gray-300"><i data-lucide="clock"></i></div>
                            <div class="flex items-center space-x-2">
                                <span class="text-xs text-gray-300 uppercase">Données du :</span>
                                <span class="text-sm font-bold">${activeTab === "JOURNALIER" ? currentDate : 'Année 2026'}</span>
                            </div>
                        </div>
                    </div>
                    <!-- Navigation Tabs au lieu des bulles -->
                    <div class="mt-auto flex items-end">
                        ${tabsHtml}
                    </div>
                </header>

                <!-- MAIN -->
                <main class="flex-1 overflow-hidden relative">
                    ${mainContent}
                </main>

                <!-- FOOTER ALLÉGÉ (Sans onglets bulles) -->
                <footer class="bg-white border-t border-gray-200 py-2.5 px-6 flex justify-between items-center z-20">
                    <div class="text-xs font-semibold text-gray-400">
                        Dashboard CILT v2.0 - Ligne 8/9
                    </div>
                    <div class="flex items-center space-x-2 text-xs font-medium text-gray-500">
                        <div class="w-3 h-3 text-green-500"><i data-lucide="refresh-cw"></i></div>
                        <span>Actualisé le mercredi 18 mars 2026 à 08:55</span>
                    </div>
                </footer>
            `;

            // Réinitialiser les icônes Lucide après chaque rendu
            lucide.createIcons();
            
            // Initialiser les graphiques Chart.js
            initCharts();
        }

        // Lancement de l'application
        render();

    </script>
</body>
</html>
