<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CILT Heineken</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* Assurer que les icônes prennent la bonne taille par défaut */
        .lucide {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-gray-200 font-sans text-gray-900 overflow-hidden h-screen flex items-center justify-center p-4">

    <!-- Conteneur Principal -->
    <div id="app-root" class="w-full max-w-[1600px] h-full max-h-[900px] bg-white shadow-2xl rounded-xl overflow-hidden flex flex-col border border-gray-300">
        <!-- Le contenu sera injecté ici par JavaScript -->
    </div>

    <script>
        // ============================================================================
        // 1. BASE DE DONNÉES SIMULÉE (MOCK DATA)
        // ============================================================================
        const EQUIPEMENTS_DEFAUT = {
            "DEPAL 8/9": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: true, taux: 100 },
                { quart: "Nuit", real: true, taux: 100 }
            ],
            "SOUTIREUSE 8/9": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: true, taux: 100 },
                { quart: "Nuit", real: true, taux: 100 }
            ],
            "ETIQUETEUSE 8/9": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: true, taux: 96 },
                { quart: "Nuit", real: true, taux: 100 }
            ],
            "QF1/PARKER/CERMEX": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: false, taux: 0 },
                { quart: "Nuit", real: true, taux: 100 }
            ],
            "DUO1": [
                { quart: "Matin", real: false, taux: 0 },
                { quart: "Après-midi", real: false, taux: 0 },
                { quart: "Nuit", real: false, taux: 0 }
            ],
            "OCME": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: true, taux: 100 },
                { quart: "Nuit", real: false, taux: 50 }
            ],
            "PAL/MSK": [
                { quart: "Matin", real: true, taux: 100 },
                { quart: "Après-midi", real: true, taux: 94 },
                { quart: "Nuit", real: true, taux: 100 }
            ]
        };

        const DAILY_DATA = {
            "17/03/2026": {
                globalRate: 100,
                equipments: { ...EQUIPEMENTS_DEFAUT },
                tasks: [
                    { id: 1, name: "MARS CDT CILT G8/9 PAL 1, 2, 3, MSK Journalier", points: "1.3 Mousser les sols de la zone 15mns et les rincer", comment: "Raison : juste à l'eau", status: "warning" },
                    { id: 2, name: "MARS CDT CILT JOURNALIER ETIQUETEUSE CLA/CLB/CLC G8/9", points: "2.5 Les verniers sont-ils tous au standard (0) ?", comment: "Raison : usure poste", status: "warning" },
                    { id: 3, name: "MARS CDT CILT G89 OCME Journalier", points: "Purger les bacs à colle", comment: "Fait après la pause", status: "ok" }
                ]
            },
            "16/03/2026": {
                globalRate: 85,
                equipments: {
                    ...EQUIPEMENTS_DEFAUT,
                    "DEPAL 8/9": [
                        { quart: "Matin", real: true, taux: 100 },
                        { quart: "Après-midi", real: false, taux: 50 },
                        { quart: "Nuit", real: true, taux: 100 }
                    ],
                    "SOUTIREUSE 8/9": [
                        { quart: "Matin", real: true, taux: 100 },
                        { quart: "Après-midi", real: true, taux: 100 },
                        { quart: "Nuit", real: false, taux: 80 }
                    ]
                },
                tasks: [
                    { id: 4, name: "Maintenance préventive SOUTIREUSE", points: "Vérification des filtres", comment: "Filtre B remplacé en urgence", status: "error" }
                ]
            },
            "15/03/2026": { globalRate: 92, equipments: { ...EQUIPEMENTS_DEFAUT, "DUO1": [{ quart: "Matin", real: true, taux: 100 }, { quart: "Après-midi", real: true, taux: 100 }, { quart: "Nuit", real: true, taux: 100 }] }, tasks: [] },
            "14/03/2026": { globalRate: 98, equipments: EQUIPEMENTS_DEFAUT, tasks: [] },
            "13/03/2026": { globalRate: 100, equipments: EQUIPEMENTS_DEFAUT, tasks: [] }
        };

        const ANNUAL_DATA = {
            rankings: [
                { team: "Équipe C", score: 92.6, rank: 1, color: "bg-yellow-500", textColor: "text-yellow-900", borderColor: "border-yellow-600" },
                { team: "Équipe D", score: 90.0, rank: 2, color: "bg-gray-300", textColor: "text-gray-800", borderColor: "border-gray-400" },
                { team: "Équipe A", score: 89.8, rank: 3, color: "bg-orange-400", textColor: "text-orange-900", borderColor: "border-orange-500" }
            ],
            table: [
                { name: "Équipe A", heures: 88, rangements: 87, map: 98, reunion: 86, nettoyage: 88, total: 89.8 },
                { name: "Équipe B", heures: 82, rangements: 90, map: 88, reunion: 80, nettoyage: 82, total: 84.4 },
                { name: "Équipe C", heures: 91, rangements: 95, map: 99, reunion: 93, nettoyage: 91, total: 94.6 },
                { name: "Équipe D", heures: 90, rangements: 89, map: 96, reunion: 87, nettoyage: 88, total: 90.0 }
            ],
            chart: {
                months: ["Janvier", "Février", "Mars"],
                series: [
                    { name: "Équipe A", color: "#e37400", data: [88, 89, 89.8] },
                    { name: "Équipe B", color: "#6c2bd9", data: [82, 85, 84.4] },
                    { name: "Équipe C", color: "#007A33", data: [90, 91.5, 92.6] },
                    { name: "Équipe D", color: "#2563eb", data: [86, 90, 90] }
                ]
            }
        };

        // ============================================================================
        // 2. STATE GLOBALE
        // ============================================================================
        let activeTab = "JOURNALIER";
        let currentDate = "17/03/2026";

        // ============================================================================
        // 3. FONCTIONS D'AIDE ET COMPOSANTS HTML (Template Literals)
        // ============================================================================

        function setTab(tab) {
            activeTab = tab;
            render();
        }

        function setDate(date) {
            currentDate = date;
            render();
        }

        function getStatusIcon(real, taux) {
            if (taux === 0 || real === false) return `<div class="w-5 h-5 text-red-600 fill-red-100"><i data-lucide="x-circle"></i></div>`;
            if (taux > 0 && taux < 100) return `<div class="w-5 h-5 text-orange-500 fill-orange-100"><i data-lucide="alert-circle"></i></div>`;
            if (taux === 100 && real === true) return `<div class="w-5 h-5 text-green-600 fill-green-100"><i data-lucide="check-circle-2"></i></div>`;
            return `<div class="w-5 h-5 text-gray-300"><i data-lucide="minus-circle"></i></div>`;
        }

        function renderStarRating(value) {
            const isGood = value >= 85;
            const colorClass = isGood ? 'text-yellow-500 fill-yellow-400' : 'text-gray-300 fill-gray-100';
            return `<div class="flex justify-center w-5 h-5 ${colorClass}"><i data-lucide="star"></i></div>`;
        }

        function renderGaugeChart(percentage) {
            const radius = 80;
            const strokeWidth = 20;
            const normalizedRadius = radius - strokeWidth * 2;
            const circumference = normalizedRadius * Math.PI;
            const strokeDashoffset = circumference - (percentage / 100) * circumference;

            return `
                <div class="flex flex-col items-center justify-center relative w-full h-48 py-4">
                    <svg height="${radius * 1.5}" width="${radius * 2.5}" viewBox="0 0 ${radius * 2.5} ${radius * 1.2}" class="transform">
                        <!-- Arc de fond -->
                        <path d="M ${strokeWidth * 1.5} ${radius} A ${normalizedRadius} ${normalizedRadius} 0 0 1 ${radius * 2.5 - strokeWidth * 1.5} ${radius}"
                              fill="transparent" stroke="#e5e7eb" stroke-width="${strokeWidth}" stroke-linecap="round" />
                        <!-- Arc de progression -->
                        <path d="M ${strokeWidth * 1.5} ${radius} A ${normalizedRadius} ${normalizedRadius} 0 0 1 ${radius * 2.5 - strokeWidth * 1.5} ${radius}"
                              fill="transparent" stroke="#007A33" stroke-width="${strokeWidth}" stroke-linecap="round"
                              stroke-dasharray="${circumference}" stroke-dashoffset="${strokeDashoffset}"
                              class="transition-all duration-1000 ease-out" />
                    </svg>
                    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/4 flex flex-col items-center">
                        <span class="text-5xl font-extrabold text-[#1a2b49] drop-shadow-sm">${percentage}%</span>
                        <span class="text-xs font-bold text-green-700 tracking-wider mt-1">OBJECTIF 100%</span>
                    </div>
                    <div class="w-full flex justify-between px-10 absolute bottom-2">
                        <span class="text-sm font-semibold text-gray-500">0%</span>
                        <span class="text-sm font-semibold text-gray-500">100%</span>
                    </div>
                </div>
            `;
        }

        function renderEquipmentTableCard(title, data) {
            const rowsHtml = data.map((row) => `
                <tr class="border-b border-gray-50 last:border-0 hover:bg-gray-50 transition-colors">
                    <td class="py-1.5 text-gray-700 font-medium">${row.quart}</td>
                    <td class="py-1.5 text-center flex justify-center">${getStatusIcon(row.real, row.taux)}</td>
                    <td class="py-1.5 text-right font-bold text-gray-800">${row.taux > 0 ? row.taux + '%' : ''}</td>
                </tr>
            `).join('');

            return `
                <div class="bg-white border border-gray-200 shadow-sm overflow-hidden flex flex-col h-full">
                    <div class="bg-[#f0accb] text-[#5c1c3c] font-bold text-xs py-1.5 px-2 text-center border-b border-gray-300 uppercase tracking-tight">
                        ${title}
                    </div>
                    <div class="p-1 flex-grow">
                        <table class="w-full text-xs">
                            <thead>
                                <tr class="text-gray-500 border-b border-gray-100">
                                    <th class="text-left font-semibold pb-1 w-1/2">Quart</th>
                                    <th class="text-center font-semibold pb-1">Réal</th>
                                    <th class="text-right font-semibold pb-1">Taux</th>
                                </tr>
                            </thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderCustomLineChart(chartData) {
            const width = 600;
            const height = 300;
            const padding = { top: 20, right: 30, bottom: 40, left: 50 };
            const minY = 80;
            const maxY = 100;

            const getCoordinates = (index, value) => {
                const x = padding.left + (index * ((width - padding.left - padding.right) / (chartData.months.length - 1)));
                const y = height - padding.bottom - ((value - minY) / (maxY - minY)) * (height - padding.top - padding.bottom);
                return { x, y };
            };

            const legendHtml = chartData.series.map(serie => `
                <div class="flex items-center text-xs font-semibold text-gray-600">
                    <span class="w-3 h-3 rounded-full mr-2 inline-block shadow-sm" style="background-color: ${serie.color}"></span>
                    ${serie.name}
                </div>
            `).join('');

            const gridYHtml = [80, 85, 90, 95, 100].map(val => {
                const y = getCoordinates(0, val).y;
                return `
                    <g>
                        <line x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4" />
                        <text x="${padding.left - 10}" y="${y + 4}" text-anchor="end" font-size="12" fill="#6b7280" font-weight="500">${val}%</text>
                    </g>
                `;
            }).join('');

            const gridXHtml = chartData.months.map((month, idx) => {
                const x = getCoordinates(idx, minY).x;
                return `
                    <g>
                        <line x1="${x}" y1="${padding.top}" x2="${x}" y2="${height - padding.bottom}" stroke="#f3f4f6" stroke-width="1" />
                        <text x="${x}" y="${height - padding.bottom + 20}" text-anchor="middle" font-size="13" fill="#4b5563" font-weight="600">${month}</text>
                    </g>
                `;
            }).join('');

            const linesHtml = chartData.series.map(serie => {
                const points = serie.data.map((val, idx) => {
                    const coord = getCoordinates(idx, val);
                    return `${coord.x},${coord.y}`;
                }).join(" L ");

                const dotsHtml = serie.data.map((val, idx) => {
                    const coord = getCoordinates(idx, val);
                    return `<circle cx="${coord.x}" cy="${coord.y}" r="5" fill="white" stroke="${serie.color}" stroke-width="2.5" class="cursor-pointer hover:r-6 transition-all"><title>${serie.name} - ${chartData.months[idx]}: ${val}%</title></circle>`;
                }).join('');

                return `
                    <g>
                        <path d="M ${points}" fill="none" stroke="${serie.color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="transition-all duration-500 hover:stroke-[4px]" />
                        ${dotsHtml}
                    </g>
                `;
            }).join('');

            return `
                <div class="w-full h-full flex flex-col items-center">
                    <div class="flex justify-center space-x-6 mb-2">${legendHtml}</div>
                    <svg viewBox="0 0 ${width} ${height}" class="w-full h-full max-h-[350px] overflow-visible">
                        ${gridYHtml}
                        ${gridXHtml}
                        ${linesHtml}
                    </svg>
                </div>
            `;
        }

        // ============================================================================
        // 4. VUES PRINCIPALES (PAGES)
        // ============================================================================

        function renderJournalierView() {
            const currentData = DAILY_DATA[currentDate] || DAILY_DATA["17/03/2026"];
            const dates = Object.keys(DAILY_DATA);

            const datesHtml = dates.map(d => `
                <label class="flex items-center space-x-3 p-2 rounded cursor-pointer transition-colors ${currentDate === d ? 'bg-green-50 border border-green-200' : 'hover:bg-gray-100 border border-transparent'}">
                    <input type="checkbox" class="w-4 h-4 text-green-600 rounded border-gray-300 focus:ring-green-500" 
                           ${currentDate === d ? 'checked' : ''} onchange="setDate('${d}')" />
                    <span class="text-sm ${currentDate === d ? 'font-bold text-green-800' : 'text-gray-700'}">${d}</span>
                </label>
            `).join('');

            const tasksHtml = currentData.tasks.length > 0 ? currentData.tasks.map(task => `
                <div class="grid grid-cols-3 gap-2 border-b border-gray-100 pb-3 mb-3 text-xs">
                    <div class="font-semibold text-gray-800 flex items-start gap-1">
                        <div class="w-3 h-3 text-gray-400 mt-0.5 flex-shrink-0"><i data-lucide="check-square"></i></div>
                        ${task.name}
                    </div>
                    <div class="text-gray-600">${task.points}</div>
                    <div class="flex items-start space-x-1 text-gray-700 bg-gray-50 p-1 rounded">
                        <div class="w-3 h-3 text-blue-400 mt-0.5 flex-shrink-0"><i data-lucide="file-text"></i></div>
                        <span>${task.comment}</span>
                    </div>
                </div>
            `).join('') : `
                <div class="h-full flex flex-col items-center justify-center text-gray-400 space-y-2">
                    <div class="w-12 h-12 text-gray-200"><i data-lucide="check-circle-2"></i></div>
                    <p class="text-sm">Aucune anomalie signalée ce jour.</p>
                </div>
            `;

            return `
                <div class="flex h-full gap-4 bg-gray-50 p-4">
                    <!-- Colonne gauche -->
                    <div class="w-48 bg-white border border-gray-200 shadow-sm flex flex-col">
                        <div class="bg-gray-800 text-white font-bold text-sm py-2 px-3 flex justify-between items-center">
                            <span>Filtres</span>
                            <div class="w-4 h-4 text-gray-300"><i data-lucide="alert-circle"></i></div>
                        </div>
                        <div class="p-3 bg-gray-100 border-b border-gray-200 font-semibold text-sm flex items-center space-x-2">
                            <div class="w-4 h-4 text-gray-600"><i data-lucide="calendar"></i></div>
                            <span>DCS J</span>
                        </div>
                        <div class="flex-1 overflow-y-auto p-2 space-y-1">
                            ${datesHtml}
                        </div>
                    </div>

                    <!-- Zone Centrale -->
                    <div class="flex-1 flex flex-col gap-4">
                        <div class="grid grid-cols-2 gap-4 h-56">
                            <div class="bg-white border border-gray-200 shadow-sm flex flex-col">
                                <div class="bg-[#f0accb] text-[#5c1c3c] font-bold text-sm py-2 px-3 border-b border-gray-300 uppercase">
                                    CONFORMITÉ GLOBAL DES ÉQUIPEMENTS
                                </div>
                                <div class="flex-1 flex items-center justify-center">
                                    ${renderGaugeChart(currentData.globalRate)}
                                </div>
                            </div>
                            ${renderEquipmentTableCard("DEPAL 8/9", currentData.equipments["DEPAL 8/9"])}
                        </div>
                        <div class="grid grid-cols-3 gap-4 flex-1">
                            ${renderEquipmentTableCard("SOUTIREUSE 8/9", currentData.equipments["SOUTIREUSE 8/9"])}
                            ${renderEquipmentTableCard("ETIQUETEUSE 8/9", currentData.equipments["ETIQUETEUSE 8/9"])}
                            ${renderEquipmentTableCard("QF1/PARKER/CERMEX", currentData.equipments["QF1/PARKER/CERMEX"])}
                            ${renderEquipmentTableCard("DUO1", currentData.equipments["DUO1"])}
                            ${renderEquipmentTableCard("OCME", currentData.equipments["OCME"])}
                            ${renderEquipmentTableCard("PAL/MSK", currentData.equipments["PAL/MSK"])}
                        </div>
                    </div>

                    <!-- Colonne Droite -->
                    <div class="w-[450px] bg-white border border-gray-200 shadow-sm flex flex-col">
                        <div class="bg-gray-100 border-b border-gray-200 py-2 px-3 flex justify-between items-center text-xs font-bold text-gray-700 uppercase">
                            <div class="flex-1">Tâches</div>
                            <div class="flex-1">Points de contrôle</div>
                            <div class="flex-1">Commentaires</div>
                        </div>
                        <div class="flex-1 overflow-y-auto p-2">
                            <div class="space-y-2">
                                ${tasksHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAnnuelView() {
            const ranks = ANNUAL_DATA.rankings;
            
            const tableHtml = ANNUAL_DATA.table.map(row => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="py-4 px-4 font-bold text-gray-800">
                        <div class="flex flex-col"><span>${row.name}</span><span class="text-xs text-gray-400 font-normal">2026</span></div>
                    </td>
                    <td class="py-4 px-2"><div class="flex items-center justify-center space-x-1">${renderStarRating(row.heures)}<span class="text-gray-600 font-medium">${row.heures}%</span></div></td>
                    <td class="py-4 px-2"><div class="flex items-center justify-center space-x-1">${renderStarRating(row.rangements)}<span class="text-gray-600 font-medium">${row.rangements}%</span></div></td>
                    <td class="py-4 px-2"><div class="flex items-center justify-center space-x-1">${renderStarRating(row.map)}<span class="text-gray-600 font-medium">${row.map}%</span></div></td>
                    <td class="py-4 px-2"><div class="flex items-center justify-center space-x-1">${renderStarRating(row.reunion)}<span class="text-gray-600 font-medium">${row.reunion}%</span></div></td>
                    <td class="py-4 px-2"><div class="flex items-center justify-center space-x-1">${renderStarRating(row.nettoyage)}<span class="text-gray-600 font-medium">${row.nettoyage}%</span></div></td>
                </tr>
            `).join('');

            return `
                <div class="flex flex-col h-full gap-4 bg-gray-50 p-4">
                    <!-- Podiums -->
                    <div class="flex space-x-4 h-32 w-full max-w-5xl mx-auto">
                        <div class="flex-1 ${ranks[1].color} border-t-4 ${ranks[1].borderColor} shadow-md flex flex-col items-center justify-center p-4 transform translate-y-4">
                            <div class="flex items-center space-x-2"><div class="w-8 h-8 text-gray-100 drop-shadow"><i data-lucide="medal"></i></div><h2 class="text-xl font-bold ${ranks[1].textColor} uppercase tracking-widest">${ranks[1].team}</h2></div>
                            <p class="text-3xl font-black ${ranks[1].textColor} mt-1">${ranks[1].score}%</p>
                        </div>
                        <div class="flex-1 ${ranks[0].color} border-t-4 ${ranks[0].borderColor} shadow-lg flex flex-col items-center justify-center p-4 z-10 scale-105">
                            <div class="flex items-center space-x-2"><div class="w-10 h-10 text-yellow-100 drop-shadow-md"><i data-lucide="trophy"></i></div><h2 class="text-2xl font-black ${ranks[0].textColor} uppercase tracking-widest">${ranks[0].team}</h2></div>
                            <p class="text-4xl font-black ${ranks[0].textColor} mt-1">${ranks[0].score}%</p>
                        </div>
                        <div class="flex-1 ${ranks[2].color} border-t-4 ${ranks[2].borderColor} shadow-md flex flex-col items-center justify-center p-4 transform translate-y-6">
                            <div class="flex items-center space-x-2"><div class="w-7 h-7 text-orange-100 drop-shadow"><i data-lucide="medal"></i></div><h2 class="text-lg font-bold ${ranks[2].textColor} uppercase tracking-widest">${ranks[2].team}</h2></div>
                            <p class="text-2xl font-black ${ranks[2].textColor} mt-1">${ranks[2].score}%</p>
                        </div>
                    </div>

                    <!-- Table & Chart -->
                    <div class="flex gap-4 flex-1 mt-6">
                        <div class="flex-1 bg-white border border-gray-200 shadow-sm overflow-hidden flex flex-col">
                            <table class="w-full text-sm">
                                <thead>
                                    <tr class="bg-yellow-200 text-yellow-900 border-b-2 border-yellow-300">
                                        <th class="py-3 px-2 text-left font-bold uppercase">Équipe</th>
                                        <th class="py-3 px-2 text-center font-bold text-xs uppercase">Heures Présence</th>
                                        <th class="py-3 px-2 text-center font-bold text-xs uppercase">Rangements</th>
                                        <th class="py-3 px-2 text-center font-bold text-xs uppercase">MAP</th>
                                        <th class="py-3 px-2 text-center font-bold text-xs uppercase">Réunion</th>
                                        <th class="py-3 px-2 text-center font-bold text-xs uppercase">Nettoyage</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">${tableHtml}</tbody>
                            </table>
                        </div>
                        <div class="flex-1 bg-white border border-gray-200 shadow-sm p-4 flex flex-col">
                            <h3 class="text-center font-bold text-gray-700 mb-4 uppercase text-sm tracking-wider">Évolution de la conformité</h3>
                            <div class="flex-1 w-full relative">${renderCustomLineChart(ANNUAL_DATA.chart)}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================================================
        // 5. RENDU PRINCIPAL DE L'APPLICATION
        // ============================================================================

        function render() {
            const root = document.getElementById("app-root");
            
            let mainContent = "";
            if (activeTab === "JOURNALIER") mainContent = renderJournalierView();
            else if (activeTab === "ANNUEL") mainContent = renderAnnuelView();
            else mainContent = `
                <div class="flex flex-col items-center justify-center h-full bg-gray-50 space-y-4">
                    <div class="w-16 h-16 text-gray-300 animate-spin-slow"><i data-lucide="settings"></i></div>
                    <p class="text-xl font-bold text-gray-500 uppercase tracking-widest">En cours de développement</p>
                    <p class="text-gray-400">Vue : ${activeTab}</p>
                </div>
            `;

            // Helper pour les boutons d'onglets du bas
            const renderTabBtn = (id, label) => `
                <button onclick="setTab('${id}')" class="px-6 py-3 font-bold text-sm uppercase transition-all flex items-center space-x-2 border-b-4 ${activeTab === id ? 'border-green-700 text-green-800 bg-white' : 'border-transparent text-gray-500 hover:text-gray-800 hover:bg-gray-100'}">
                    ${label}
                </button>
            `;

            // Menu déroulant Année visible que dans la vue annuelle
            const yearDropdownHtml = activeTab === "ANNUEL" ? `
                <div class="flex items-center space-x-2 bg-white py-1.5 px-3 rounded border border-gray-300 cursor-pointer hover:bg-gray-50">
                    <span>Année</span><span class="font-bold text-gray-800 ml-2">2026</span>
                    <div class="w-4 h-4"><i data-lucide="chevron-down"></i></div>
                </div>
            ` : '';

            root.innerHTML = `
                <!-- HEADER -->
                <header class="flex justify-between items-center px-6 py-4 bg-white border-b border-gray-200">
                    <div class="flex items-center space-x-6">
                        <div class="flex items-center">
                            <div class="w-6 h-6 text-red-600 fill-red-600 mr-2 transform -rotate-12"><i data-lucide="star"></i></div>
                            <h1 class="text-3xl font-black tracking-tighter text-[#007A33]">HEINEKEN</h1>
                        </div>
                        <h2 class="text-3xl font-bold text-[#007A33] ml-4 tracking-tight drop-shadow-sm">
                            ${activeTab === "JOURNALIER" ? "CONFORMITE CILT JOURNALIER 8/9" : "CONFORMITE ANNUELLE BILAN 8/9"}
                        </h2>
                    </div>
                    <div class="flex items-center space-x-4 bg-gray-50 py-2 px-4 rounded-lg border border-gray-200">
                        <div class="w-5 h-5 text-gray-400"><i data-lucide="clock"></i></div>
                        <div class="flex flex-col">
                            <span class="text-xs text-gray-500 font-semibold uppercase">Date d'extraction</span>
                            <span class="text-sm font-bold text-gray-800">${activeTab === "JOURNALIER" ? 'DCS du ' + currentDate : 'Année 2026'}</span>
                        </div>
                    </div>
                </header>

                <!-- MAIN -->
                <main class="flex-1 overflow-hidden relative">
                    ${mainContent}
                </main>

                <!-- FOOTER -->
                <footer class="bg-white border-t border-gray-200 flex flex-col z-20">
                    <div class="py-3 px-6 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                        <div class="flex space-x-3">
                            <button class="bg-gray-900 hover:bg-black text-white font-bold py-2 px-8 rounded-full shadow-sm transition-all text-sm uppercase">
                                ${activeTab === "JOURNALIER" ? "JOURNALIER" : "ANNUEL"}
                            </button>
                            <button class="bg-[#f0accb] hover:bg-[#e691b8] text-[#5c1c3c] font-bold py-2 px-6 rounded-full shadow-sm border border-[#d88ba8] transition-all text-sm uppercase">FIN DE PROD</button>
                            <button class="bg-[#f0accb] hover:bg-[#e691b8] text-[#5c1c3c] font-bold py-2 px-6 rounded-full shadow-sm border border-[#d88ba8] transition-all text-sm uppercase">A1</button>
                            <button class="bg-[#f0accb] hover:bg-[#e691b8] text-[#5c1c3c] font-bold py-2 px-6 rounded-full shadow-sm border border-[#d88ba8] transition-all text-sm uppercase">SEMAINE</button>
                        </div>
                        <div class="flex items-center space-x-4 text-xs font-semibold text-gray-500">
                            <span class="bg-white py-1.5 px-3 rounded border border-gray-200 shadow-sm">
                                Actualisé le mercredi 18 mars 2026 à 08:55
                            </span>
                            ${yearDropdownHtml}
                        </div>
                    </div>
                    <div class="flex overflow-x-auto bg-gray-50 pl-2">
                        ${renderTabBtn('JOURNALIER', 'JOURNALIER')}
                        ${renderTabBtn('FIN_DE_PROD', 'FIN DE PROD')}
                        ${renderTabBtn('A1', 'A1')}
                        ${renderTabBtn('SEMAINE', 'SEMAINE')}
                        ${renderTabBtn('ANNUEL', 'ANNUEL')}
                        ${renderTabBtn('BULLES', 'Bulles')}
                        ${renderTabBtn('BULLES_2', 'Bulles 2')}
                        <button class="bg-green-700 text-white p-3 hover:bg-green-800 transition-colors flex items-center justify-center">
                            <span class="text-xl font-bold leading-none">+</span>
                        </button>
                    </div>
                </footer>
            `;

            // Initialiser les icônes Lucide après avoir injecté le HTML
            lucide.createIcons();
        }

        // Démarrage initial
        render();

    </script>
</body>
</html>
